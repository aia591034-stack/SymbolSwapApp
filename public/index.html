<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER MARKET | 次世代アセット取引</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #050505; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto space-y-8">
        <!-- 接続UI -->
        <div class="glass p-8 rounded-3xl">
            <h1 class="text-xl font-bold mb-6 text-indigo-400">ウォレット接続 (本番環境)</h1>
            <div class="flex gap-4 mb-6">
                <button onclick="setAuthMode('sss')" id="mode-sss" class="px-4 py-2 bg-indigo-600 rounded text-sm font-bold">SSS拡張機能</button>
                <button onclick="setAuthMode('direct')" id="mode-direct" class="px-4 py-2 bg-gray-700 rounded text-sm font-bold">秘密鍵入力</button>
            </div>
            <div id="direct-mode-input" class="hidden mb-6">
                <input type="password" id="user-private-key" placeholder="秘密鍵 (64桁)" class="w-full p-3 bg-gray-900 border border-gray-700 rounded mb-3 text-sm">
                <button onclick="connectDirect()" class="w-full py-3 bg-yellow-600 rounded font-bold text-sm">秘密鍵で接続</button>
            </div>
            <button id="connectSssBtn" class="w-full py-3 bg-blue-600 rounded font-bold text-sm">SSSで接続</button>
            <div id="status" class="mt-4 text-xs text-gray-400">未接続</div>
        </div>

        <!-- 商品一覧 -->
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <script src="https://xembook.github.io/nem2-browserify/symbol-sdk-2.0.4.js"></script>
    <script>
        let authMode = 'sss';
        let activeAddress = null;
        let activePrivateKey = null;
        let activePublicKey = null;
        const symbol = require("/node_modules/symbol-sdk");

        function setAuthMode(mode) {
            authMode = mode;
            document.getElementById('mode-sss').className = mode === 'sss' ? 'px-4 py-2 bg-indigo-600 rounded text-sm font-bold' : 'px-4 py-2 bg-gray-700 rounded text-sm font-bold';
            document.getElementById('mode-direct').className = mode === 'direct' ? 'px-4 py-2 bg-indigo-600 rounded text-sm font-bold' : 'px-4 py-2 bg-gray-700 rounded text-sm font-bold';
            document.getElementById('direct-mode-input').classList.toggle('hidden', mode !== 'direct');
            document.getElementById('connectSssBtn').classList.toggle('hidden', mode !== 'sss');
        }

        async function connectDirect() {
            const pk = document.getElementById('user-private-key').value.trim();
            try {
                const account = symbol.Account.createFromPrivateKey(pk, symbol.NetworkType.TEST_NET);
                activeAddress = account.address.plain();
                activePrivateKey = pk;
                activePublicKey = account.publicKey;
                document.getElementById('status').innerText = '接続済み: ' + activeAddress;
            } catch (e) { alert('接続失敗: 秘密鍵を確認してください'); }
        }

        async function buyProduct(p) {
            if (!activeAddress) return alert('ウォレットを接続してください');

            if (authMode === 'sss') {
                // SSS購入フロー (既存)
                alert('SSSで署名してください');
                // (既存のSSS署名ロジックをここに呼び出す)
            } else {
                // 秘密鍵モードの購入フロー
                const buildRes = await fetch('/api/build_transaction', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ productId: p.id, buyerPublicKey: activePublicKey })
                });
                const buildData = await buildRes.json();
                
                const account = symbol.Account.createFromPrivateKey(activePrivateKey, symbol.NetworkType.TEST_NET);
                const signature = account.signData(buildData.hash);
                
                const announceRes = await fetch('/api/announce_transaction', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        payload: buildData.payload,
                        cosignatures: [{ signerPublicKey: activePublicKey, signature: signature }]
                    })
                });
                alert(announceRes.ok ? '購入成功！' : '購入失敗');
            }
        }

        // ロード処理
        async function loadProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const list = document.getElementById('productList');
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'glass p-6 rounded-2xl';
                div.innerHTML = `<h2 class="text-lg font-bold">${p.title}</h2><button onclick='buyProduct(${JSON.stringify(p)})' class="mt-4 px-4 py-2 bg-green-600 rounded">購入する</button>`;
                list.appendChild(div);
            });
        }
        window.onload = loadProducts;
    </script>
</body>
</html>
