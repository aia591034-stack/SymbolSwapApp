<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER MARKET - 次世代デジタルアセット・ハブ</title>
    <!-- Tailwind CSS for Professional UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'xs': '475px',
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
        :root { --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.2); }
        body { font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif; background-color: #050505; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(99, 102, 241, 0.3); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); position: relative; overflow: hidden; }
        .btn-primary::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); transition: 0.5s; }
        .btn-primary:hover::after { left: 100%; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(5, 5, 5, 1) 0%, rgba(5, 5, 5, 1) 100%); }
        .swap-node { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); transition: all 0.5s ease; }
        .swap-node.active { border-color: #6366f1; box-shadow: 0 0 30px rgba(99, 102, 241, 0.5); background: rgba(99, 102, 241, 0.1); }
    </style>
</head>

<body class="antialiased">
    <div class="mesh-bg"></div>
    <div id="swap-overlay" style="display: none;" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-black/90 px-6 backdrop-blur-md">
        <div class="flex flex-col md:flex-row items-center md:space-x-12 space-y-8 md:space-y-0 mb-12">
            <div id="node-buyer" class="swap-node relative"><i class="fas fa-user text-2xl"></i></div>
            <div class="text-indigo-400 font-black tracking-[0.3em] uppercase">ATOMIC SWAP</div>
            <div id="node-seller" class="swap-node"><i class="fas fa-store text-2xl"></i></div>
        </div>
        <h2 id="swap-status-title" class="text-2xl md:text-3xl font-black text-white">実行中...</h2>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-4 md:px-8 py-4 mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="text-xl font-black tracking-tighter">AETHER<span class="text-indigo-500">MARKET</span></span>
            <button id="connectSssBtn" class="btn-primary px-6 py-3 rounded-2xl text-[10px] font-black text-white">CONNECT WALLET</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-32">
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        <div id="empty-state" class="hidden py-32 text-center text-slate-500 font-black">NO ASSETS DETECTED</div>
    </main>

    <script src="https://xembook.github.io/nem2-browserify/symbol-sdk-2.0.4.js"></script>
    <script>
        const symbol = window.symbol; // CDNから使用
        let activeAddress = null;
        let activePublicKey = null;
        let operatorAddress = null;
        let allProducts = [];

        async function renderProducts() {
            const list = document.getElementById('productList');
            list.innerHTML = '';
            
            allProducts.forEach(p => {
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-3xl";
                card.innerHTML = `
                    <h3 class="text-2xl font-black text-white">${p.title}</h3>
                    <p class="text-slate-400 text-sm mt-2">${p.description || "No description"}</p>
                    <button id="buy-${p.id}" class="mt-6 w-full py-4 btn-primary rounded-xl font-black uppercase text-[10px]">
                        ${p.isPurchased ? 'RETRIEVE ASSET' : 'EXECUTE SWAP'}
                    </button>
                `;
                list.appendChild(card);
                
                const btn = document.getElementById(`buy-${p.id}`);
                if (p.isPurchased) {
                    btn.className = "mt-6 w-full py-4 bg-emerald-500 rounded-xl font-black uppercase text-[10px] text-white";
                    btn.onclick = () => window.location.href = `/api/products/${p.id}/download?address=${activeAddress}`;
                } else {
                    btn.onclick = () => buyProduct(p);
                }
            });
        }

        async function loadProducts() {
            const url = activeAddress ? `/api/products?address=${activeAddress}` : '/api/products';
            const res = await fetch(url);
            allProducts = await res.json();
            renderProducts();
        }

        async function buyProduct(p) {
            if (!activeAddress) return alert('Connect wallet');
            
            // トランザクション構築〜署名〜アナウンスのフロー（前回実装したもの）
            const buildRes = await fetch('/api/build_transaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: p.id, buyerPublicKey: activePublicKey, activeAddress: activeAddress })
            });
            const { payload, hash } = await buildRes.json();
            
            window.SSS.setTransaction(symbol.TransactionMapping.createFromPayload(payload));
            const signedTx = await window.SSS.requestSign();
            
            await fetch('/api/announce_transaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payload, cosignatures: [{ parentHash: hash, signature: signedTx.signature, signerPublicKey: activePublicKey }] })
            });
            
            // 承認待ち確認...
            checkStatus(hash, activeAddress, p);
        }

        async function checkStatus(hash, buyerAddress, p) {
            // 承認確認後、サーバーの /api/products/:id/purchase_confirm を叩く
            await fetch(`/api/products/${p.id}/purchase_confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: buyerAddress, transactionHash: hash })
            });
            loadProducts();
        }

        document.getElementById('connectSssBtn').onclick = async () => {
            if (window.SSS) {
                activeAddress = window.SSS.activeAddress;
                activePublicKey = window.SSS.activePublicKey;
                await loadProducts();
            }
        };

        window.onload = loadProducts;
    </script>
</body>
</html>
