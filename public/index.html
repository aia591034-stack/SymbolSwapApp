<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER MARKET | 次世代デジタルアセット・ハブ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif; background-color: #050505; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s; }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>

<body class="antialiased">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-8 py-4 mb-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-aeon text-white text-xl"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter">AETHER<span class="text-indigo-500">MARKET</span></span>
            </div>
            <div class="flex items-center space-x-6">
                <button id="connectSssBtn" class="btn-primary flex items-center space-x-2 px-6 py-3 rounded-2xl text-xs font-black text-white">
                    <i class="fas fa-fingerprint"></i>
                    <span>SSSウォレットで接続</span>
                </button>
                <a href="landing.html" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-slate-400 hover:text-indigo-400 border border-white/5 transition-all">
                    <i class="fas fa-book text-sm"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 pb-32">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8 space-y-16">
                <!-- Hero -->
                <section class="glass rounded-[3rem] p-16 border-white/10" data-aos="fade-up">
                    <h1 class="text-6xl font-black mb-8 leading-[1.1] tracking-tighter">
                        デジタル資産を<br /><span class="gradient-text">次世代へ</span>
                    </h1>
                    <p class="text-lg text-slate-400 mb-12 font-medium">Symbolの信頼不要なアトミックスワップ技術で、デジタルデータを安全に取引。</p>
                    <button class="btn-primary px-8 py-4 rounded-2xl text-xs font-black tracking-widest text-white uppercase">マーケットを探す</button>
                </section>

                <!-- Market -->
                <section class="space-y-10">
                    <h2 class="text-4xl font-black tracking-tighter text-white">アセット一覧</h2>
                    <div id="productList" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                </section>
            </div>

            <!-- Sidebar -->
            <aside class="lg:col-span-4 space-y-10">
                <section id="user-dashboard" class="hidden glass-card rounded-[2.5rem] p-10 shadow-2xl">
                    <h3 class="font-black text-lg mb-6">ダッシュボード</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                            <span class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">出品数</span>
                            <span id="my-items-count" class="text-2xl font-black">0</span>
                        </div>
                        <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                            <span class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">購入数</span>
                            <span id="purchased-count" class="text-2xl font-black">0</span>
                        </div>
                    </div>
                </section>

                <!-- Sell Asset -->
                <section id="sell-asset-card" class="glass-card rounded-[2.5rem] p-10 shadow-2xl">
                    <h2 class="text-xl font-black uppercase text-white mb-10">アセットを出品</h2>
                    <div id="sell-form" class="space-y-8 opacity-40 pointer-events-none transition-all">
                        <div class="space-y-3">
                            <label class="text-[9px] font-black text-indigo-400 uppercase tracking-[0.3em] ml-1">アセット名</label>
                            <input type="text" id="pTitle" placeholder="名前を入力" class="w-full px-6 py-5 rounded-2xl bg-white/5 border border-white/5 outline-none font-black text-[10px] text-white">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[9px] font-black text-indigo-400 uppercase tracking-[0.3em] ml-1">価格 (XYM)</label>
                            <input type="number" id="pPrice" value="10" class="w-full px-6 py-5 rounded-2xl bg-white/5 border border-white/5 outline-none font-black text-indigo-500 text-lg">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[9px] font-black text-indigo-400 uppercase tracking-[0.3em] ml-1">画像URL</label>
                            <input type="text" id="pImageUrl" placeholder="https://..." class="w-full px-6 py-5 rounded-2xl bg-white/5 border border-white/5 outline-none font-medium text-[10px] text-white">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[9px] font-black text-indigo-400 uppercase tracking-[0.3em] ml-1">ファイル</label>
                            <input type="file" id="pFile" class="w-full p-5 bg-white/5 rounded-2xl border border-white/5">
                        </div>
                        <button id="listBtn" class="btn-primary w-full py-6 rounded-2xl text-white font-black text-[10px] uppercase tracking-[0.3em]">出品する</button>
                    </div>
                    <div id="connect-prompt" class="mt-4 text-center">
                        <p class="text-[9px] font-black text-indigo-400/50 uppercase tracking-[0.2em]">接続が必要です</p>
                    </div>
                </section>
            </aside>
        </div>
    </main>

    <script src="https://xembook.github.io/nem2-browserify/symbol-sdk-2.0.4.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        const symbol = require("/node_modules/symbol-sdk");
        let activeAddress = null, activePublicKey = null, operatorAddress = null, allProducts = [];

        async function loadProducts() {
            try {
                const configRes = await fetch('/api/config');
                const config = await configRes.json();
                const networkType = symbol.NetworkType.TEST_NET;
                const operatorAccount = symbol.PublicAccount.createFromPublicKey(config.operatorPublicKey, networkType);
                operatorAddress = operatorAccount.address.plain();
                const res = await fetch('/api/products');
                allProducts = await res.json();
                renderProducts();
            } catch (e) { console.error(e); }
        }

        function renderProducts() {
            const list = document.getElementById('productList');
            list.innerHTML = '';
            allProducts.forEach(p => {
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-3xl";
                card.innerHTML = `<h3 class="text-lg font-bold">${p.title}</h3><p class="text-sm text-gray-400">${p.price} XYM</p><button id="buy-${p.id}" class="mt-4 w-full py-3 bg-green-600 rounded-xl font-bold">購入する</button>`;
                list.appendChild(card);
                document.getElementById('buy-${p.id}').onclick = () => alert('購入処理を開始します');
            });
        }

        document.getElementById('connectSssBtn').onclick = async () => {
            if(window.SSS) {
                activeAddress = window.SSS.activeAddress;
                activePublicKey = window.SSS.activePublicKey;
                document.getElementById('status').innerText = '接続済み';
                document.getElementById('user-address-short').innerText = activeAddress;
                document.getElementById('user-dashboard').classList.remove('hidden');
                document.getElementById('sell-form').classList.remove('opacity-40', 'pointer-events-none');
                document.getElementById('connect-prompt').classList.add('hidden');
                loadProducts();
            } else {
                alert('SSSウォレットが見つかりません');
            }
        };
        
        window.onload = loadProducts;
    </script>
</body>
</html>
